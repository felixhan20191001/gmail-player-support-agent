# Read-only investigation playbook for Coin Frenzy / coin.frenzy activity purchases.
# SQL is generated by the model via query_clickhouse; nothing here is auto-executed.

coin_frenzy_policy = """
Pass / activity purchases (starlight pass, coin.frenzy, beginning packs etc.) activate eligibility
to claim rewards. Rewards are **not** delivered instantly after purchase. The player must complete
tasks/levels to gain points/progress, then manually claim rewards tier by tier in the pass/activity
interface. Purchase only unlocks better rewards than the free track; it does not auto-grant everything.
"""

[[investigation_steps]]
id = "purchase_records"
summary = "Query purchase-related events for the player on the project table."
goal = "Confirm whether a pass-like product (starlight pass, coin.frenzy etc.) was purchased successfully."

[[investigation_steps]]
id = "interpret_product"
summary = "Check product_id on successful purchase events."
goal = "Decide whether the purchase is a pass/activity product (starlight etc.) versus another IAP."

[purchase_query_hints]
select_columns = ["log_time", "product_id", "event_name", "price"]
event_name_candidates = [
  "PurchaseSuccess",
  "PurchaseClick",
  "PaySuccess",
  "Purchase",
  "BuyProduct",
]
product_id_patterns = ["coin.frenzy", "coin_frenzy", "coinfrenzy", "pass", "starlight", "starlight.pass", "starlight pass", "com.black.hole.*pass", "black.hole.*pass"]
notes = [
  "Use the project-specific ClickHouse table from get_coin_frenzy_investigation_playbook.",
  "BlackHole uses the blackhole table for Android and iOS unless config says otherwise.",
  "Filter by user_id and log_time with LIMIT.",
  "查询的时间窗口需要改成：查询开始时间大于（用户反馈时间的5天前）,不要显示查询结束时间。即只用 AND log_time >= '5天前日期'，不要结束时间条件。使用read_email_thread里的邮件日期计算。",
  "Always include product filter in query: AND (product_id LIKE '%pass%' OR product_id LIKE '%starlight%' OR product_id LIKE '%coin.frenzy%')",
  "Treat PurchaseSuccess/PaySuccess with pass-like or coin.frenzy-like product_id (pass, starlight, coin.frenzy etc.) as successful pass/activity purchase.",
]

[[example_sql]]
id = "purchase_records_example"
description = "Reference only; use only start time >= (email date - 5 days), no end time condition."
sql = """
SELECT log_time AS purchase_time, product_id, event_name, price
FROM <table>
WHERE event_name IN ('PurchaseSuccess','PurchaseClick','PaySuccess')
  AND user_id = '<user_id>'
  AND log_time >= '<5_days_before_email_date>'
  AND (product_id LIKE '%pass%' OR product_id LIKE '%starlight%' OR product_id LIKE '%coin.frenzy%')
ORDER BY log_time DESC
LIMIT 100
"""

[[outcome_branches]]
id = "no_purchase_success"
condition = "No PurchaseSuccess/PaySuccess with coin.frenzy-like product_id in logs."
recommended_template_id = "no_purchase_record_reinstall_check"
recommended_action = "draft_for_review"
human_review = true
verdict = "inconclusive"

[[outcome_branches]]
id = "coin_frenzy_purchase_confirmed"
condition = "PurchaseSuccess/PaySuccess with pass-like or coin.frenzy-like product_id found."
recommended_template_id = "coin_frenzy_task_reward_explanation"
recommended_action = "create_draft"
human_review = false
verdict = "supported"

[[outcome_branches]]
id = "other_product_purchase"
condition = "Successful purchase found but product_id is not pass-like or coin.frenzy-like."
recommended_template_id = ""
recommended_action = "handoff_human"
human_review = true
verdict = "inconclusive"