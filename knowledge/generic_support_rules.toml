[[rules]]
id = "freecash_sync_details_request"
case_types = ["freecash_sync_misunderstanding"]
triggers = [
  "freecash",
  "积分墙",
  "sync with Freecash",
  "not syncing with Freecash",
  "freecash.*sync",
  "game isn't syncing",
  "任务.*同步",
  "没同步",
  "未到账",
]
priority = 72
summary = "Game not syncing with Freecash offerwall; collect Freecash ID and exact unrewarded stage/task. Never redirect player to Freecash support."
requires_logs = false
action = "draft_reply"
human_review = false
reply_template = "freecash_sync_details_request"
instructions = [
  "Use when player reports game not syncing with Freecash or offerwall task completed but reward not received.",
  "**Do NOT tell the player to contact Freecash or the offerwall's customer service.** We will follow up.",
  "Ask specifically for the player's freecashid (or offerwall app account ID) and exactly which stage/task/offer was completed without the reward syncing to the game.",
  "Use the freecash_sync_details_request template to ask for these details politely and clearly.",
  "In extract_feedback_claim use case_type=freecash_sync_misunderstanding.",
  "After rules, proceed to decide and use the template-based draft to request the missing info.",
]
