[[rules]]
id = "coin_frenzy_activity_log_investigation"
case_types = ["pass_purchase_misunderstanding", "gameplay_misunderstanding", "payment"]
require_trigger_match = true
triggers = [
  "coin frenzy",
  "coin.frenzy",
  "frenzy",
  "beginning pack",
  "level requirement",
  "completing the level",
  "level up",
  "level ups",
  "receiving credit",
  "not receiving credit",
  "time restraint",
  "eat everything",
  "haven't received my rewards",
  "didn't get my credit",
  "treasure tide",
  "starlight pass",
  "starlight",
  "bought .*pass",
  "pass and did not receive",
  "pass.*not received",
]
priority = 87
summary = "Investigate pass / activity purchases (starlight pass, coin frenzy etc.); explain task-based reward claiming after purchase."
requires_logs = true
required_evidence = ["product_id", "purchase_event"]
action = "draft_reply"
human_review = false
reply_template = "coin_frenzy_task_reward_explanation"
instructions = [
  "The model must classify activity/task-reward purchase confusion in extract_feedback_claim; **strongly prefer pass_purchase_misunderstanding** (do not use plain 'payment') when the player bought a pass (starlight pass etc.) but expects instant rewards.",
  "Call get_coin_frenzy_investigation_playbook, then query_clickhouse for purchase records with model-generated SELECT looking for pass-like product_id.",
  "Call assess_coin_frenzy_log_evidence with structured findings before drafting.",
  "If logs show successful purchase with pass-like product_id (contains pass/starlight/coin.frenzy etc), use the pass reward explanation (purchase activates eligibility; player must complete tasks/levels and manually claim; adapt template to actual details and language).",
  "If no successful pass-like purchase found, ask for valid iOS or Google order details.",
  "After assess_coin_frenzy_log_evidence + assess_claim_credibility, immediately call decide_support_action. Do not re-read or re-extract.",
  "Do not treat confirmed pass purchases as high-risk payment handoff.",
  "Never claim purchase records were checked unless query_clickhouse returned evidence.",
]

