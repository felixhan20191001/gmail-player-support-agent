triggers = ["严重bug", "bug", "无法继续", "不能继续", "broken"]
priority = 30
summary = "Concrete bug reports with enough details should be handed to human support or technical review."
requires_logs = false
action = "handoff_human"
human_review = true
instructions = [
  "If the player provides a concrete bug report with details, prefer human handoff instead of generic drafting.",
]

