[[rules]]
id = "payment_issue_handoff"
case_types = ["payment"]
triggers = [
  "充值未到账",
  "内购未到账",
  "购买未到账",
  "未到账",
  "没到",
  "没收到",
  "扣款",
  "payment missing",
  "not received",
  "didn't receive",
  "did not receive",
  "never received",
  "never got",
  "no purchase",
]
priority = 85
summary = "Explicit payment-not-received cases should be handed off to human support unless a specific safe template rule is clearly supported by evidence."
requires_logs = true
required_evidence = ["purchase_event", "order_id"]
action = "handoff_human"
human_review = true
require_trigger_match = true
instructions = [
  "Use only when the player explicitly says a charge/purchase did not arrive or was not credited.",
  "Do not use for paid-but-UI-bug complaints (blank page, empty slot, cannot access reward after paying). Use blank_page_screenshot_request with case_type=bug instead.",
  "Do not use for Coin Frenzy / coin.frenzy activity purchases where rewards require completing tasks. Use coin_frenzy_activity_log_investigation with pass_purchase_misunderstanding instead.",
  "Payment cases are high risk.",
  "If order or purchase evidence is unclear, create a human handoff instead of drafting a definitive answer.",
]

[[rules]]
id = "ad_loading_playback_troubleshooting"
case_types = ["ad_issue"]
triggers = [
  "广告加载",
  "广告播放",
  "广告卡住",
  "关闭广告",
  "无法关闭",
  "卡死",
  "看完广告",
  "没有奖励",
  "奖励",
  "网络",
  "存储空间",
  "ad loading",
  "ad playback",
  "ads freeze",
  "ads freezing",
  "adds freeze",
  "adds freezing",
  "freezing",
  "freeze",
  "stuck",
  "can't close",
  "cannot close",
  "no reward",
  "reward",
  "watch ad",
  "watched ad",
  "shutting down",
  "shuts down",
  "shut down",
  "wipes out",
  "wipe out",
  "progress",
  "ad comes up",
  "every time an ad",
  "crash",
  "crashes",
]
priority = 58
