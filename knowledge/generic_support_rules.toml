[[rules]]
id = "never_ask_server_or_character_name"
always_include = true
priority = 99
summary = "Games have no multi-server support workflow; never ask players for server ID or in-game character name."
requires_logs = false
action = "draft_reply"
human_review = false
instructions = [
  "Our games are not multi-server MMOs. Support does not use server ID or character name to investigate issues.",
  "Never ask for server ID, server, 区服, character name, 角色名, nickname, or in-game name in player-facing drafts.",
  "When userid or user id is present in the email, treat identity as sufficient for log lookup.",
  "If userid is missing, ask only for user id through the in-game support flow or email metadata, not server or character name.",
]

[[rules]]
id = "empty_feedback_apply_no_content_label"
case_types = ["no_content"]
always_include = true
priority = 100
summary = "Email has no substantive player feedback; apply the existing 无内容 label and skip reply."
requires_logs = false
action = "apply_label_only"
human_review = false
instructions = [
  "The model must classify this in extract_feedback_claim as no_content; tools do not auto-detect empty feedback.",
  "Use when the email body contains only form metadata such as platform, version, and userid, and the player's actual question field is empty or whitespace.",
  "Use when 'My question is:' or equivalent form fields have no meaningful text after them.",
  "Use when the subject and body have no valid player feedback, or only random/gibberish characters without a describable issue.",
  "Do not use when the player describes any concrete issue, request, complaint, or question, even briefly.",
  "Apply only the configured global label 无内容. Do not create a Gmail draft or human handoff.",
  "After applying 无内容, call mark_gmail_messages_read for the same message_ids.",
  "Save case state as skipped.",
]

