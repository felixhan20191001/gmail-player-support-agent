# Read-only investigation playbook for ads_after_purchase cases.
# SQL is generated by the model via query_clickhouse; nothing here is auto-executed.

remove_ads_policy = """
Ad-removal purchases remove forced interstitial and banner ads.
Optional rewarded video (RV) ads may remain when the player chooses extra rewards.
"""

[[investigation_steps]]
id = "purchase_records"
summary = "Query purchase-related events for the player on the project table."
goal = "Find whether a remove-ads product was purchased successfully."

[[investigation_steps]]
id = "interstitial_ads"
summary = "Query interstitial ad show events after confirming remove-ads purchase."
goal = "Check whether forced interstitial ads still appear after the purchase time."

[[investigation_steps]]
id = "compare_timeline"
summary = "Compare remove-ads PurchaseSuccess time with latest AdShow_Inter time."
goal = "Decide whether remaining ads are likely optional RV ads or forced interstitials."

[purchase_query_hints]
select_columns = ["log_time", "product_id", "event_name", "price"]
event_name_candidates = [
  "PurchaseSuccess",
  "PurchaseClick",
  "PaySuccess",
  "Purchase",
  "BuyProduct",
]
product_id_patterns = ["removead", "remove_ads", "no_ads", "noads", "ad_free", "removeads"]
notes = [
  "Use the project-specific ClickHouse table from get_remove_ads_investigation_playbook.",
  "When platform_table_routing is returned, choose table by email platform (iOS vs Android).",
  "BusFever: iOS players use carmania; Android players use busfever.",
  "Filter by user_id and a bounded log_time window with LIMIT.",
  "Use literal log_time >=/<= bounds in SQL that match time_window_start/end (max 168 hours).",
  "Do not use now() - INTERVAL in SQL; anchor the window around the email date.",
  "Treat PurchaseSuccess/PaySuccess with remove-ads-like product_id as successful purchase.",
]

[interstitial_query_hints]
select_columns = ["log_time", "pos", "event_name"]
event_name_candidates = ["AdShow_Inter"]
notes = [
  "Order by log_time DESC to find the latest interstitial show.",
  "If the latest AdShow_Inter is earlier than the remove-ads purchase time, forced interstitials likely stopped.",
]

[[example_sql]]
id = "purchase_records_example"
description = "Reference only; replace <table> with the project table and user_id/time window."
sql = """
SELECT log_time AS purchase_time, product_id, event_name, price
FROM <table>
WHERE event_name IN ('PurchaseSuccess','PurchaseClick')
  AND user_id = '<user_id>'
  AND log_time >= '<time_window_start>'
  AND log_time < '<time_window_end>'
ORDER BY log_time DESC
LIMIT 100
"""

[[example_sql]]
id = "interstitial_ads_example"
description = "Reference only; replace <table> with the project table and user_id/time window."
sql = """
SELECT log_time, pos, event_name
FROM <table>
WHERE event_name = 'AdShow_Inter'
  AND user_id = '<user_id>'
  AND log_time >= '<time_window_start>'
  AND log_time < '<time_window_end>'
ORDER BY log_time DESC
LIMIT 100
"""

[[outcome_branches]]
id = "no_purchase_success"
condition = "No PurchaseSuccess/PaySuccess with remove-ads-like product_id in logs."
recommended_template_id = "remove_ads_no_order_request_order_id"
recommended_action = "draft_for_review"
human_review = true
verdict = "inconclusive"

[[outcome_branches]]
id = "purchase_click_only"
condition = "Only PurchaseClick exists without successful remove-ads purchase."
recommended_template_id = "remove_ads_no_order_request_order_id"
recommended_action = "draft_for_review"
human_review = true
verdict = "inconclusive"

[[outcome_branches]]
id = "rv_only_after_purchase"
condition = "Remove-ads purchase succeeded and latest AdShow_Inter is before purchase time."
recommended_template_id = "ads_after_purchase_rv_only_explanation"
recommended_action = "create_draft"
human_review = false
verdict = "supported"

[[outcome_branches]]
id = "forced_interstitial_after_purchase"
condition = "Remove-ads purchase succeeded but AdShow_Inter still appears after purchase time."
recommended_template_id = ""
recommended_action = "handoff_human"
human_review = true
verdict = "contradicted"